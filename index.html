<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Marcador de Ventas</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    .marcador {
      margin: 20px auto;
      width: 90%;
      max-width: 900px;
      background: #050505;
      border: 8px solid #555;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 20px #000;
    }

    .titulo {
      font-size: 28px;
      color: #ffd700;
      margin-bottom: 15px;
    }

    .tabla {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .gestor {
      background: #111827;
      border: 2px solid #2563eb;
      border-radius: 8px;
      padding: 10px;
    }

    .gestor h3 {
      margin: 5px 0;
      font-size: 16px;
    }

    .goles {
      font-size: 32px;
      color: #ff4d00;
      font-weight: bold;
    }

    button {
      background: #16a34a;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #22c55e;
    }

    .campo {
      position: relative;
      margin: 25px auto;
      width: 90%;
      max-width: 900px;
      height: 420px;
      background: linear-gradient(
        90deg,
        #15803d 0%,
        #15803d 20%,
        #16a34a 20%,
        #16a34a 40%,
        #15803d 40%,
        #15803d 60%,
        #16a34a 60%,
        #16a34a 80%,
        #15803d 80%
      );
      border: 5px solid white;
      overflow: hidden;
    }

    .linea-medio {
      position: absolute;
      left: 50%;
      top: 0;
      width: 4px;
      height: 100%;
      background: white;
      transform: translateX(-50%);
    }

    .circulo {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 4px solid white;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .porteria {
      position: absolute;
      width: 80px;
      height: 160px;
      border: 4px solid white;
      top: 50%;
      transform: translateY(-50%);
    }

    .izquierda {
      left: 0;
      border-left: none;
    }

    .derecha {
      right: 0;
      border-right: none;
    }

    .jugador {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 90px;
    }
  </style>
</head>
<body>

  <div class="marcador">
    <div class="titulo">⚽ Marcador de Ventas ⚽</div>

    <div class="tabla" id="tablaGestores"></div>
  </div>

  <div class="campo">
    <div class="linea-medio"></div>
    <div class="circulo"></div>
    <div class="porteria izquierda"></div>
    <div class="porteria derecha"></div>

    <!-- Aquí puedes cambiar el GIF -->
    <img src="jugador.gif" class="jugador" id="jugador">
  </div>

  <script>
    const gestores = [
      { nombre: "Gestor 1", goles: 0 },
      { nombre: "Gestor 2", goles: 0 },
      { nombre: "Gestor 3", goles: 0 },
      { nombre: "Gestor 4", goles: 0 },
      { nombre: "Gestor 5", goles: 0 },
      { nombre: "Gestor 6", goles: 0 },
      { nombre: "Gestor 7", goles: 0 },
      { nombre: "Gestor 8", goles: 0 },
      { nombre: "Gestor 9", goles: 0 },
      { nombre: "Gestor 10", goles: 0 },
      { nombre: "Gestor 11", goles: 0 },
      { nombre: "Gestor 12", goles: 0 },
      { nombre: "Gestor 13", goles: 0 },
      { nombre: "Gestor 14", goles: 0 },
      { nombre: "Gestor 15", goles: 0 }
    ];

    const tabla = document.getElementById("tablaGestores");

    function renderizar() {
      tabla.innerHTML = "";

      gestores.forEach((gestor, index) => {
        tabla.innerHTML += `
          <div class="gestor">
            <h3>${gestor.nombre}</h3>
            <div class="goles">${gestor.goles}</div>
            <button onclick="sumarGol(${index})">+ Venta / Gol</button>
          </div>
        `;
      });
    }

    function sumarGol(index) {
      gestores[index].goles++;
      animarJugador();
      renderizar();
    }

    function animarJugador() {
      const jugador = document.getElementById("jugador");
      jugador.style.transition = "1s";
      jugador.style.left = "75%";

      setTimeout(() => {
        jugador.style.transition = "0s";
        jugador.style.left = "30px";
      }, 1200);
    }

    renderizar();
  </script>

</body>
</html>
